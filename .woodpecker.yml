when:
  branch: demo
  event: [push, tag]

steps:
  - name: build
    image: docker
    commands:
      - docker build -t keni-web:${CI_COMMIT_SHA:0:7} -t keni-web:latest .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  - name: deploy
    image: docker
    commands:
      - docker stop keni-web-demo 2>/dev/null || true
      - docker rm keni-web-demo 2>/dev/null || true
      - |
        docker run -d \
          --name keni-web-demo \
          --network balancer \
          --restart unless-stopped \
          --memory 256m \
          -l "traefik.enable=true" \
          -l "traefik.docker.network=balancer" \
          -l "traefik.http.routers.keni-web-demo.entrypoints=web" \
          -l "traefik.http.routers.keni-web-demo.rule=Host(\`demo.kenitech.io\`)" \
          -l "traefik.http.services.keni-web-demo.loadbalancer.server.port=3000" \
          keni-web:${CI_COMMIT_SHA:0:7}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
