when:
  branch: demo
  event: [push, tag]

steps:
  - name: build
    image: docker
    commands:
      - docker build -t keni-web:${CI_COMMIT_SHA:0:7} -t keni-web:latest .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  - name: deploy
    image: ghcr.io/moghtech/komodo-cli:1.19.5
    environment:
      KOMODO_CLI_HOST:
        from_secret: komodo_host
      KOMODO_CLI_KEY:
        from_secret: komodo_key
      KOMODO_CLI_SECRET:
        from_secret: komodo_secret
    commands:
      - km -y update stack keni-web-demo "environment=KENI_WEB_VERSION%3D${CI_COMMIT_SHA:0:7}"
      - km -y deploy stack keni-web-demo
