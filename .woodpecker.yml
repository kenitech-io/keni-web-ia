when:
  branch: demo
  event: [push, tag]

steps:
  - name: build-and-push
    image: docker
    environment:
      REGISTRY_USER:
        from_secret: registry_user
      REGISTRY_PASS:
        from_secret: registry_pass
    commands:
      - REGISTRY=devops-registry.kenitech.io
      - IMAGE=$REGISTRY/keni-web
      - TAG=${CI_COMMIT_SHA:0:7}
      - docker build -t $IMAGE:$TAG -t $IMAGE:latest .
      - echo "$REGISTRY_PASS" | docker login $REGISTRY -u "$REGISTRY_USER" --password-stdin
      - docker push $IMAGE:$TAG
      - docker push $IMAGE:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  - name: deploy
    image: debian:bookworm
    environment:
      KOMODO_CLI_KEY:
        from_secret: komodo_key
      KOMODO_CLI_SECRET:
        from_secret: komodo_secret
      KOMODO_CLI_HOST: http://komodo-core:9120
    commands:
      - apt-get update -qq && apt-get install -y -qq libssl3 ca-certificates curl 2>/dev/null 1>/dev/null
      - curl -sL https://github.com/moghtech/komodo/releases/download/v2.0.0/km-$(uname -m) -o /usr/local/bin/km && chmod +x /usr/local/bin/km
      - km execute -y deploy-stack keni-web-demo
