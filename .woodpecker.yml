when:
  branch: demo
  event: [push, tag]

steps:
  - name: build
    image: docker
    commands:
      - cd ${CI_WORKSPACE}
      - docker build -t keni-web:${CI_COMMIT_SHA:0:7} -t keni-web:latest .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  - name: deploy
    image: ghcr.io/moghtech/komodo-cli:1.19.5
    environment:
      KOMODO_HOST:
        from_secret: komodo_host
      KOMODO_KEY:
        from_secret: komodo_key
      KOMODO_SECRET:
        from_secret: komodo_secret
    commands:
      - km set var keni-web-demo KENI_WEB_VERSION ${CI_COMMIT_SHA:0:7}
      - km deploy stack keni-web-demo
