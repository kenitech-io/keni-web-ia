<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      /*
        Keni Architecture v5 (revised)
        3 bare metal servers
        CI and CD separated, Observability with Monitoring + Alerts
      */
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="960" height="760" fill="#FAFAF8"/>

  <!-- ====== SAAS ====== -->
  <text x="56" y="58" font-size="10" font-weight="500" fill="#999" letter-spacing="2">SAAS</text>

  <rect x="136" y="42" width="138" height="34" rx="17" fill="#FAFAF8" stroke="#ccc" stroke-width="0.8"/>
  <text x="205" y="64" font-size="12" font-weight="400" fill="#444" text-anchor="middle">Overlay Network</text>

  <rect x="290" y="42" width="138" height="34" rx="17" fill="#FAFAF8" stroke="#ccc" stroke-width="0.8"/>
  <text x="359" y="64" font-size="12" font-weight="400" fill="#444" text-anchor="middle">Secrets</text>

  <rect x="444" y="42" width="138" height="34" rx="17" fill="#FAFAF8" stroke="#ccc" stroke-width="0.8"/>
  <text x="513" y="64" font-size="12" font-weight="400" fill="#444" text-anchor="middle">Identity</text>

  <rect x="598" y="42" width="138" height="34" rx="17" fill="#FAFAF8" stroke="#ccc" stroke-width="0.8"/>
  <text x="667" y="64" font-size="12" font-weight="400" fill="#444" text-anchor="middle">Repository</text>

  <rect x="752" y="42" width="138" height="34" rx="17" fill="#FAFAF8" stroke="#ccc" stroke-width="0.8"/>
  <text x="821" y="64" font-size="12" font-weight="400" fill="#444" text-anchor="middle">Backup</text>

  <line x1="56" y1="96" x2="892" y2="96" stroke="#E8E8E6" stroke-width="0.6"/>

  <!-- ====== CORE ====== -->
  <rect x="56" y="132" width="836" height="240" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="86" y="154" font-size="10" font-weight="500" fill="#999" letter-spacing="2">CORE</text>
  <text x="86" y="170" font-size="11" font-weight="300" fill="#bbb">Bare Metal</text>

  <!-- Overlay Network bar -->
  <rect x="80" y="186" width="788" height="20" rx="10" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.6"/>
  <text x="474" y="200" font-size="9" font-weight="400" fill="#aaa" text-anchor="middle" letter-spacing="1">OVERLAY NETWORK</text>

  <!-- Docker container -->
  <rect x="80" y="214" width="788" height="110" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="96" y="230" font-size="11" font-weight="300" fill="#bbb">Docker</text>

  <!-- CI dashed group -->
  <rect x="88" y="242" width="300" height="66" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="238" y="258" font-size="9" font-weight="500" fill="#999" text-anchor="middle" letter-spacing="1.5">CI</text>

  <!-- Build (purple) -->
  <rect x="104" y="270" width="130" height="28" rx="4" fill="#EDE7F6" stroke="#5E35B1" stroke-width="0.8"/>
  <text x="169" y="289" font-size="11" font-weight="400" fill="#4527A0" text-anchor="middle">Build</text>

  <!-- Store (yellow) -->
  <rect x="242" y="270" width="130" height="28" rx="4" fill="#FFF9C4" stroke="#D4B000" stroke-width="0.8"/>
  <text x="307" y="289" font-size="11" font-weight="400" fill="#C6A700" text-anchor="middle">Store</text>

  <!-- CD dashed group -->
  <rect x="400" y="242" width="162" height="66" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="481" y="258" font-size="9" font-weight="500" fill="#999" text-anchor="middle" letter-spacing="1.5">CD</text>

  <!-- Deploy (orange) -->
  <rect x="416" y="270" width="130" height="28" rx="4" fill="#FFF3E0" stroke="#EF6C00" stroke-width="0.8"/>
  <text x="481" y="289" font-size="11" font-weight="400" fill="#E65100" text-anchor="middle">Deploy</text>

  <!-- Observability dashed group -->
  <rect x="574" y="242" width="284" height="66" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="716" y="258" font-size="9" font-weight="500" fill="#999" text-anchor="middle" letter-spacing="1.5">OBSERVABILITY</text>

  <!-- Monitoring (teal) -->
  <rect x="582" y="270" width="130" height="28" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="0.8"/>
  <text x="647" y="289" font-size="11" font-weight="400" fill="#00695C" text-anchor="middle">Monitoring</text>

  <!-- Alerts (teal) -->
  <rect x="720" y="270" width="130" height="28" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="0.8"/>
  <text x="785" y="289" font-size="11" font-weight="400" fill="#00695C" text-anchor="middle">Alerts</text>

  <!-- Proxy bar (full server width) -->
  <rect x="80" y="336" width="788" height="18" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="0.8"/>
  <text x="474" y="349" font-size="9" font-weight="400" fill="#C62828" text-anchor="middle">Proxy</text>

  <!-- ====== DEV ====== -->
  <rect x="56" y="408" width="400" height="304" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="86" y="430" font-size="10" font-weight="500" fill="#999" letter-spacing="2">DEV</text>
  <text x="86" y="446" font-size="11" font-weight="300" fill="#bbb">Bare Metal</text>

  <!-- Overlay Network -->
  <rect x="80" y="462" width="352" height="20" rx="10" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.6"/>
  <text x="256" y="476" font-size="9" font-weight="400" fill="#aaa" text-anchor="middle" letter-spacing="1">OVERLAY NETWORK</text>

  <!-- Docker container -->
  <rect x="80" y="490" width="352" height="174" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="96" y="506" font-size="11" font-weight="300" fill="#bbb">Docker</text>

  <!-- CD dashed group -->
  <rect x="100" y="518" width="168" height="102" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="184" y="534" font-size="9" font-weight="500" fill="#999" text-anchor="middle" letter-spacing="1.5">CD</text>

  <!-- Deploy Agent (orange) -->
  <rect x="119" y="546" width="130" height="28" rx="4" fill="#FFF3E0" stroke="#EF6C00" stroke-width="0.8"/>
  <text x="184" y="565" font-size="11" font-weight="400" fill="#E65100" text-anchor="middle">Deploy Agent</text>

  <!-- Secrets Agent (blue) -->
  <rect x="119" y="582" width="130" height="28" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="184" y="601" font-size="11" font-weight="400" fill="#0D47A1" text-anchor="middle">Secrets Agent</text>

  <!-- App Stacks -->
  <rect x="284" y="518" width="130" height="28" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="349" y="537" font-size="11" font-weight="300" fill="#aaa" text-anchor="middle">App Stack</text>

  <rect x="284" y="554" width="130" height="28" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="349" y="573" font-size="11" font-weight="300" fill="#aaa" text-anchor="middle">App Stack</text>

  <rect x="284" y="590" width="130" height="28" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="349" y="609" font-size="11" font-weight="300" fill="#aaa" text-anchor="middle">App Stack</text>

  <!-- Proxy bar (full server width) -->
  <rect x="80" y="676" width="352" height="18" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="0.8"/>
  <text x="256" y="689" font-size="9" font-weight="400" fill="#C62828" text-anchor="middle">Proxy</text>

  <!-- ====== PROD ====== -->
  <rect x="492" y="408" width="400" height="304" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="522" y="430" font-size="10" font-weight="500" fill="#999" letter-spacing="2">PROD</text>
  <text x="522" y="446" font-size="11" font-weight="300" fill="#bbb">Bare Metal</text>

  <!-- Overlay Network -->
  <rect x="516" y="462" width="352" height="20" rx="10" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.6"/>
  <text x="692" y="476" font-size="9" font-weight="400" fill="#aaa" text-anchor="middle" letter-spacing="1">OVERLAY NETWORK</text>

  <!-- Docker container -->
  <rect x="516" y="490" width="352" height="174" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="532" y="506" font-size="11" font-weight="300" fill="#bbb">Docker</text>

  <!-- CD dashed group -->
  <rect x="536" y="518" width="168" height="102" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="620" y="534" font-size="9" font-weight="500" fill="#999" text-anchor="middle" letter-spacing="1.5">CD</text>

  <!-- Deploy Agent (orange) -->
  <rect x="555" y="546" width="130" height="28" rx="4" fill="#FFF3E0" stroke="#EF6C00" stroke-width="0.8"/>
  <text x="620" y="565" font-size="11" font-weight="400" fill="#E65100" text-anchor="middle">Deploy Agent</text>

  <!-- Secrets Agent (blue) -->
  <rect x="555" y="582" width="130" height="28" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="620" y="601" font-size="11" font-weight="400" fill="#0D47A1" text-anchor="middle">Secrets Agent</text>

  <!-- Backup bar (inside Docker) -->
  <rect x="536" y="633" width="314" height="18" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="693" y="646" font-size="9" font-weight="400" fill="#2E7D32" text-anchor="middle">Backup Agent</text>

  <!-- App Stacks -->
  <rect x="720" y="518" width="130" height="28" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="785" y="537" font-size="11" font-weight="300" fill="#aaa" text-anchor="middle">App Stack</text>

  <rect x="720" y="554" width="130" height="28" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="785" y="573" font-size="11" font-weight="300" fill="#aaa" text-anchor="middle">App Stack</text>

  <rect x="720" y="590" width="130" height="28" rx="4" fill="none" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="785" y="609" font-size="11" font-weight="300" fill="#aaa" text-anchor="middle">App Stack</text>

  <!-- Proxy bar (full server width) -->
  <rect x="516" y="676" width="352" height="18" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="0.8"/>
  <text x="692" y="689" font-size="9" font-weight="400" fill="#C62828" text-anchor="middle">Proxy</text>

</svg>